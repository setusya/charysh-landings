<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Чарышские Усадьбы — для сообщества Архстояние</title>
<meta name="description" content="Деревенский курорт Чарыш — recovery-курорт на 72 га в тупиковой долине Алтайского края. Архитектурный регламент LH47, кураторская линия Никола-Ленивец. Среда для работы и отдыха, три формы инвестиций: дом с УК, тематический инвестор, акционер АО.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700&display=swap">
<link rel="stylesheet" href="tokens.css">
<link rel="stylesheet" href="site.css">
<link rel="stylesheet" href="privatecamps.css">
<link rel="stylesheet" href="arhstoyanie.css">
</head>
<body class="tone-warm accent-red type-s cards-bordered">
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="components/RapportStrip.jsx"></script>
<script type="text/babel" src="components/Header.jsx"></script>
<script type="text/babel" src="components/Place.jsx"></script>
<script type="text/babel" src="components/Houses.jsx"></script>
<script type="text/babel" src="components/Community.jsx"></script>
<script type="text/babel" src="components/Extras.jsx"></script>
<script type="text/babel" src="components/Visit.jsx"></script>
<script type="text/babel" src="components/PrivateCamp.jsx"></script>
<script type="text/babel" src="components/Arhstoyanie.jsx"></script>

<script type="text/babel">
function ArhstoyanieApp() {
  React.useEffect(() => {
    const els = document.querySelectorAll('.reveal');
    const io = new IntersectionObserver((es) => {
      es.forEach(e => { if (e.isIntersecting) e.target.classList.add('in'); });
    }, { rootMargin: '0px 0px -10% 0px' });
    els.forEach(el => io.observe(el));
    return () => io.disconnect();
  }, []);

  return (
    <div data-screen-label="00 Архстояние — Speaker Landing">
      <ARHeader />

      {/* 01 ─── HOOK · открытие для архитекторов/дизайнеров/инвесторов ─── */}
      <PCHero
        heroPhoto="assets/photo/charysh-aerial.jpg"
        crumbLabel="Архстояние"
        crumbExtra="Никола-Ленивец"
        meta="Чарышские Усадьбы · для сообщества Архстояние"
        h1={<>Среда для работы<br/>и&nbsp;для&nbsp;восстановления</>}
        sub={<><strong>Деревенский курорт Чарыш — 72&nbsp;га в&nbsp;собственности, тупиковая долина Алтайского края.</strong> Архитектурный регламент LH47, кураторская линия Никола-Ленивец, recovery на&nbsp;маралах, травах и&nbsp;климате. Для&nbsp;тех, кто строит проекты с&nbsp;ритмом — и&nbsp;ищет место с&nbsp;ним&nbsp;же.</>}
        primaryCtaText="Запросить презентацию"
        primaryCtaHref="#form"
        secondaryCtaText="Три формы участия"
        secondaryCtaHref="#forms-fork"
        tagline="ЧАРЫШ ЖДЁТ СВОИХ"
      />

      {/* 02 ─── МАНИФЕСТ · recovery-курорт ─── */}
      <PCScale />

      {/* 03 ─── МЕСТО · компактно (природа + климат + локация) ─── */}
      <ARPlaceCompact />

      {/* 04 ─── РЫНОК · Большой Алтай (макроконтекст) ─── */}
      <PCAltaiMarket />

      {/* 05 ─── RECOVERY POTENTIAL · травы · маралы · климат · место силы ─── */}
      <ARRecovery />

      {/* 06 ─── СРЕДА · для работы и отдыха ─── */}
      <ARWorkRest />

      <RapportStrip variant={2} tone="redOnWhite" height={48} />

      {/* 07 ─── АРХИТЕКТУРА · LH47 + Никола-Ленивец ─── */}
      <PCArchitecture />

      {/* 08 ─── МАСТЕР-ПЛАН + рендер ─── */}
      <PCMasterPlan />
      <PCMasterPlanRender />

      {/* 09 ─── ЛЮДИ · команда + кураторы (компактно) ─── */}
      <ARPeopleCompact />

      {/* 10 ─── ВЫБОР · четыре формы участия (развилка) ─── */}
      <PCThreeForms />

      {/* 11 ─── ОПЦИЯ А · хронология стройки и каталог домов ─── */}
      <PCConstructionTimeline />

      {/* 12 ─── ОПЦИЯ А · экономика (от 11,4 млн · 60% дохода · окуп. 6 лет) ─── */}
      <PCEconomics />

      {/* 13 ─── ОПЦИЯ Б · тематический инвестор · объекты для входа ─── */}
      <PCFormBObjects />

      {/* 14 ─── ВИТРИНА · ретрит-зона (визуальная опора для опции Б) ─── */}
      <PCRetreatShowcase />

      {/* 15 ─── ОПЦИЯ В · акции АО (от 2 500 ₽ · 285% за 5 лет) ─── */}
      <PCFormCEquity />

      {/* 16 ─── ЧТО УЖЕ СДЕЛАНО · доказательство ─── */}
      <PCWhatsBuilt />

      {/* 17 ─── ФИНАЛ · следующий шаг ─── */}
      <ARFinalCTA />
      <RapportStrip variant={3} tone="goldOnBlack" height={56} />
      <Footer />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<ArhstoyanieApp />);
</script>
</body>
</html>
